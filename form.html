<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    </head>
    <body>
<h1>注册信息</h1>
<form >
<h2>个人信息</h2>
<label >姓名</label><input type="text" placeholder="请输入真实姓名">
<br>
<br>
<label >密码</label><input type="password" placeholder="请输入密码">
<br>
<br>
<label >确认密码</label><input type="password" placeholder="请输入确认密码">
<br>
<br>
<label >性别</label>
<label></label><input type="radio" name="性别" checked>男</label>
<label></label><input type="radio" name="性别">女</label>
<br><br>
<label >居住城市：</label>
<select>
    <option>北京</option>
    <option>上海</option>
    <option>广州</option>
    <option>陕西</option>
    <option>山西</option>
</select>
<br>
<h2>教育经历</h2>
<select>最高学历：
    <option>小学</option>
    <option>高中</option>
    <option>大学</option>
</select>
<label >学校名称：</label>学校名称：<input type="text">
<br>
<br>
<label >在校时间：</label>
<select>
    <option>2015</option>
    <option>2016</option>
    <option>2017</option>
</select>
--
<select>
    <option>2022</option>
    <option>2023</option>
    <option>2024</option>
</select>
<br>
<h2>工作经历</h2>
<label >公司名称</label>
<input type="text">
<br>
<br>
<label >工作描述</label><textarea placeholder="请输入描述"></textarea>
<br><br>
<input type="checkbox"><label>已阅读并同意以下协议</label>
<ul><a href="#">《用户服务协议》</a></ul>
<ul><a href="#">隐私政策</a></ul>
<br><br><br>
<button>免费注册</button>
<button type="reset">重新填写</button>
</form>

</body>
</html>
